<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet de contacts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>
            <span>📝 Formulaire</span> de contacts
        </h1>
    </header>
    <main id="f-main">
        <form id="form">

            <fieldset>
                <label for="nom"> Nom et Prenom : </label>
                <input type="text" id="nom" name="nom" placeholder="nom prenom..." required>
            </fieldset>
            <fieldset>
                <label for="telephone"> Téléphone </label>
                <input type="tel" id="telephone" name="telephone" placeholder="+... 01..." required>
            </fieldset>
            <fieldset>
                <label for="email"> Email </label>
                <input type="email" id="email" name="email" placeholder="adresse@exemple.com" required>
            </fieldset>
            <div>
                <button type="submit" id="enregister"> Enregistrer </button>
                <a href="index.html"> Retour </a>
            </div>
        </form>
    </main>
    <footer>
        <p>📒 Contacts en ligne | Créateur : SOULEMANE Dihyath | © 2025-2026</p>
    </footer>
    
     <script src="script.js"></script>

</body>
</html>
