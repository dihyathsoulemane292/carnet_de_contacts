    <main>

            <thead>
                <tr>
                    <th>Nom et prénom</th>
                    <th>Téléphone</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </main>

    <footer>
        <p>📒 Contacts en ligne | Créateur : SOULEMANE Dihyath | © 2025-2026</p>
    </footer>
